name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  AZURE_RESOURCE_GROUP: rg-the-library
  AZURE_FUNCTIONAPP_NAME: func-the-library
  AZURE_STATIC_WEB_APP_NAME: swa-the-library

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Include Static Web App config
        run: cp staticwebapp.config.json dist/staticwebapp.config.json

      - name: Restore backend dependencies
        run: dotnet restore api/api.csproj

      - name: Build backend
        run: dotnet build api/api.csproj --configuration Release --no-restore

      - name: Publish backend package
        run: dotnet publish api/api.csproj --configuration Release --output api/publish --no-build

      - name: Create backend deployment archive
        run: |
          cd api/publish
          zip -r ../functionapp.zip .

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Azure Functions app
        run: az functionapp deployment source config-zip --resource-group "$AZURE_RESOURCE_GROUP" --name "$AZURE_FUNCTIONAPP_NAME" --src api/functionapp.zip

      - name: Fetch Static Web App deployment token
        id: swa_token
        run: echo "token=$(az staticwebapp secrets list --name \"$AZURE_STATIC_WEB_APP_NAME\" --resource-group \"$AZURE_RESOURCE_GROUP\" --query \"properties.apiKey\" -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend
        run: npx swa deploy dist --deployment-token "${{ steps.swa_token.outputs.token }}" --env production